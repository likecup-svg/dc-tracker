<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DC 퇴직연금">
<title>DC 퇴직연금 관리</title>
<style>
  :root{
    --pasteque:#FF544C;
    --zeste:#FFE458;
    --lagoon:#2AB0A3;
    --melon:#FE9A34;
    --berry:#9B2D7A;
    --leaf:#2D6A4F;
    --ink:#111111;
    --white:#ffffff;
    --card-border:rgba(255,84,76,.2);
    --dashed:rgba(255,84,76,.15);
    --bar-bg:rgba(255,228,88,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--zeste);
    color:var(--ink);
    font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    padding-bottom:90px;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── 헤더 ── */
  header{
    position:sticky; top:0; z-index:10;
    background:var(--pasteque);
    padding:24px 18px 18px;
    border-bottom:4px solid var(--lagoon);
  }
  .hd-tag{
    font-size:10px; letter-spacing:.25em; font-weight:800;
    text-transform:uppercase; color:var(--zeste); margin-bottom:10px;
  }
  .hd-label{ font-size:11px; color:rgba(255,255,255,.8); margin-bottom:2px; }
  .hd-total{ font-size:30px; font-weight:800; color:var(--white); letter-spacing:-0.02em; }
  .hd-badge{
    display:inline-block; margin-top:7px;
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:99px;
    background:rgba(0,0,0,.2);
  }
  .hd-badge.up{ color:var(--zeste); }
  .hd-badge.down{ color:var(--zeste); }
  .hd-breakdown{
    display:flex; gap:14px; flex-wrap:wrap;
    font-size:11px; color:rgba(255,255,255,.9);
    margin-top:12px; padding-top:10px;
    border-top:1px solid rgba(255,228,88,.3);
  }
  .hd-breakdown b{ font-weight:800; color:var(--white); }

  /* ── 바디 ── */
  main{ padding:14px 14px 0; }
  .sec-title{
    font-size:11px; font-weight:800; color:var(--pasteque);
    letter-spacing:.06em; text-transform:uppercase;
    margin:12px 0 8px;
    display:flex; align-items:center; gap:8px;
  }
  .sec-title::after{
    content:""; flex:1; height:2px;
    background:var(--pasteque); border-radius:99px; opacity:.3;
  }

  /* ── 카드 ── */
  .card{
    background:var(--white);
    border-radius:12px; overflow:hidden;
    border:2px solid var(--card-border);
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(255,84,76,.1);
  }

  /* ── 보유 행 ── */
  .row{ padding:11px 14px; border-bottom:1px dashed var(--dashed); }
  .row:last-child{ border-bottom:none; }
  .row-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .row-name{ font-size:13.5px; font-weight:700; }
  .row-val{ font-size:13.5px; font-weight:700; }
  .row-mid{ font-size:10px; color:#888; margin-top:2px; }
  .row-bot{ display:flex; align-items:center; gap:6px; margin-top:6px; }
  .pnl{ font-size:11px; font-weight:700; white-space:nowrap; }
  .pnl.pos{ color:var(--lagoon); }
  .pnl.neg{ color:var(--pasteque); }
  .bar-wrap{ flex:1; height:6px; border-radius:99px; overflow:hidden; background:var(--bar-bg); }
  .bar-fill{ height:100%; border-radius:99px; }
  .wt{ font-size:10px; color:#888; white-space:nowrap; }

  /* ── 자산군 바 ── */
  .brow{ padding:10px 14px; border-bottom:1px dashed var(--dashed); }
  .brow:last-child{ border-bottom:none; }
  .brow-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .brow-name{ font-size:13px; font-weight:700; }
  .brow-right{ text-align:right; }
  .brow-pct{ font-size:14px; font-weight:800; }
  .brow-amt{ font-size:10px; color:#888; display:block; }
  .brow-track{ height:8px; border-radius:99px; overflow:hidden; background:var(--bar-bg); }
  .brow-fill{ height:100%; border-radius:99px; }

  /* ── FAB ── */
  .fab{
    position:fixed; bottom:22px; right:20px;
    width:56px; height:56px; border-radius:50%;
    background:var(--lagoon); color:var(--white); font-size:26px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    border:3px solid var(--zeste);
    box-shadow:0 4px 16px rgba(42,176,163,.5);
    position:fixed;
  }
  .fab::after{
    content:""; position:absolute; top:-6px; right:12px;
    width:13px; height:8px; background:var(--leaf);
    border-radius:50% 50% 0 0; transform:rotate(15deg);
  }

  /* ── 바텀시트 ── */
  .sheet{
    position:fixed; inset:0; background:rgba(0,0,0,.45);
    display:none; align-items:flex-end; z-index:20;
  }
  .sheet.open{ display:flex; }
  .sheet-inner{
    background:var(--white); width:100%; border-radius:20px 20px 0 0;
    padding:20px 18px 28px; max-height:82vh; overflow:auto;
    border-top:4px solid var(--lagoon);
  }
  .sheet-title{
    font-size:15px; font-weight:800; color:var(--pasteque);
    margin-bottom:14px; letter-spacing:.02em;
  }
  .field{ margin-bottom:12px; }
  .field label{
    display:block; font-size:11px; font-weight:700;
    color:#888; margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em;
  }
  .field select, .field input{
    width:100%; padding:11px; border:2px solid var(--card-border);
    border-radius:8px; font-size:15px; font-family:inherit; color:var(--ink);
    background:var(--white);
  }
  .field select:focus, .field input:focus{
    outline:none; border-color:var(--lagoon);
  }
  .submit{
    width:100%; padding:14px; border:none; border-radius:10px;
    background:var(--pasteque); color:var(--white);
    font-size:15px; font-weight:800; letter-spacing:.04em;
  }
  .submit:active{ opacity:.85; }

  /* ── 토스트 ── */
  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--lagoon); color:var(--white);
    padding:9px 18px; border-radius:20px;
    font-size:12.5px; z-index:30; opacity:0; transition:opacity .3s;
    border:2px solid var(--zeste);
  }
  .toast.show{ opacity:1; }
  .refresh{ font-size:10px; color:#888; text-align:center; margin-top:10px; }
</style>
</head>
<body>

<header>
  <div class="hd-tag">DC 퇴직연금 관리</div>
  <div class="hd-label">총자산</div>
  <div class="hd-total" id="totalValue">불러오는 중...</div>
  <div id="yieldBadge"></div>
  <div class="hd-breakdown" id="breakdown"></div>
</header>

<main>
  <div class="sec-title">보유 현황</div>
  <div class="card" id="holdingsCard">
    <div id="holdingsList"></div>
  </div>

  <div class="sec-title">자산 비중</div>
  <div class="card" id="allocCard">
    <div id="donutWrap" style="padding:10px 0 6px;display:flex;justify-content:center;"></div>
    <div id="allocList"></div>
  </div>

  <div class="refresh" id="refreshTime"></div>
</main>

<button class="fab" id="openSheet">+</button>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="sheet-title">거래 기록 추가</div>
    <div class="field">
      <label>날짜</label>
      <input type="date" id="f_date">
    </div>
    <div class="field">
      <label>구분</label>
      <select id="f_type">
        <option>매수</option><option>매도</option>
        <option>입금</option><option>출금</option>
        <option>가입</option><option>해지</option>
        <option>배당</option><option>수수료</option><option>조정</option>
      </select>
    </div>
    <div class="field">
      <label>종목/상품</label>
      <select id="f_name">
        <option>TIGER 200</option>
        <option>TIGER 미국S&P500</option>
        <option>KODEX TDF2050액티브적격</option>
        <option>TIGER 미국나스닥100</option>
        <option>TIGER 미국S&P500(H)</option>
        <option>TIGER 미국나스닥100채권혼합50</option>
        <option>KODEX AI반도체TOP2플러스</option>
        <option>SOL AI반도체TOP2플러스</option>
        <option>TIGER KRX금현물</option>
        <option>TIGER 일본니케이225</option>
        <option>현금</option>
        <option>다올저축은행 퇴직연금 정기예금</option>
      </select>
    </div>
    <div class="field">
      <label>수량 / 금액 (매도·출금·해지·수수료는 마이너스)</label>
      <input type="number" id="f_qty" placeholder="예: 10 또는 -10">
    </div>
    <div class="field">
      <label>단가 (ETF 매수·매도 시)</label>
      <input type="number" id="f_price" placeholder="예: 57000">
    </div>
    <div class="field">
      <label>금리 (연%, 예금 해지 시)</label>
      <input type="number" step="0.01" id="f_rate" placeholder="예: 3.5">
    </div>
    <div class="field">
      <label>개월 (예금 해지 시)</label>
      <input type="number" id="f_months" placeholder="예: 12">
    </div>
    <button class="submit" id="submitBtn">기록 추가</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ⚠️ Apps Script 배포 후 받은 웹 앱 URL을 여기에 붙여넣으세요
const API_URL = "https://script.google.com/macros/s/AKfycbxTNbFDX5G8IG_mFYZG9H9B0dZPD25eS5GNnapP4vifwhVaTGi7BgejH_LMGHkh4iM/exec";
const INITIAL_AMOUNT = 111043786;

const CLASS_COLORS = {
  "미국주식":   "#FF544C",
  "한국주식":   "#2AB0A3",
  "일본주식":   "#E34C83",
  "혼합":       "#FE9A34",
  "대체자산":   "#C9A227",
  "현금성자산": "#9B2D7A",
  "예수금":     "#2D6A4F"
};

const el = id => document.getElementById(id);

function showToast(msg) {
  const t = el("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function fmt(n) { return Math.round(n).toLocaleString(); }

async function loadData() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    render(data);
  } catch(err) {
    el("totalValue").textContent = "불러오기 실패";
    showToast("연결 실패: API_URL 확인 필요");
  }
}

function render(data) {
  // 헤더
  el("totalValue").textContent = fmt(data.total) + "원";
  const up = data.profitPct >= 0;
  el("yieldBadge").innerHTML =
    `<span class="hd-badge ${up?'up':'down'}">${up?'+':''}${(data.profitPct*100).toFixed(2)}%</span>`;

  let etf=0, cash=0, dep=0;
  data.holdings.forEach(h => {
    if (h.name === "현금") cash += h.value;
    else if (h.name.includes("예금") || h.name.includes("적금")) dep += h.value;
    else etf += h.value;
  });
  el("breakdown").innerHTML = `
    <span>ETF <b>${fmt(etf)}</b>원</span>
    <span>현금 <b>${fmt(cash)}</b>원</span>
    <span>예금 <b>${fmt(dep)}</b>원</span>`;

  // 보유 현황
  const isCash = n => n==="현금" || n.includes("예금") || n.includes("적금");
  el("holdingsList").innerHTML = data.holdings.map(h => {
    const unit   = isCash(h.name) ? "원" : "주";
    const avgStr = isCash(h.name) ? "" : ` · 평단가 ${fmt(h.avgPrice)}원`;
    const pnlHtml = isCash(h.name) ? "" :
      `<span class="pnl ${h.pnl>=0?'pos':'neg'}">${h.pnl>=0?'+':''}${fmt(h.pnl)}원 (${h.pnl>=0?'+':''}${(h.pnlPct*100).toFixed(2)}%)</span>`;
    const color = CLASS_COLORS[h.assetClass] || "#888";
    return `<div class="row">
      <div class="row-top">
        <span class="row-name">${h.name}</span>
        <span class="row-val">${fmt(h.value)}원</span>
      </div>
      <div class="row-mid">${fmt(h.qty)}${unit} · 현재가 ${fmt(h.price)}${avgStr}</div>
      <div class="row-bot">
        ${pnlHtml}
        <div class="bar-wrap"><div class="bar-fill" style="width:${(h.weight*100).toFixed(1)}%;background:${color};"></div></div>
        <span class="wt">${(h.weight*100).toFixed(1)}%</span>
      </div>
    </div>`;
  }).join("");

  // 도넛 차트
  renderDonut(data.allocation, data.total);

  // 자산군 바 차트
  el("allocList").innerHTML = data.allocation.map(a => {
    const color = CLASS_COLORS[a.name] || "#888";
    const pct   = (a.weight * 100).toFixed(1);
    return `<div class="brow">
      <div class="brow-top">
        <span class="brow-name">${a.name}</span>
        <div class="brow-right">
          <span class="brow-pct" style="color:${color};">${pct}%</span>
          <span class="brow-amt">${fmt(a.value)}원</span>
        </div>
      </div>
      <div class="brow-track"><div class="brow-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>`;
  }).join("");

  el("refreshTime").textContent = "마지막 갱신 " + new Date().toLocaleTimeString("ko-KR");
}

function renderDonut(allocation, total) {
  const W = 280, H = 270, cx = 140, cy = 135, r = 85, sw = 38;
  const C = 2 * Math.PI * r; // 534.07

  let segments = "";
  let labels   = "";
  let cumLen   = 0;

  allocation.forEach((a, i) => {
    const len    = a.weight * C;
    const offset = -cumLen; // 세그먼트 시작 위치 (누적 길이만큼 음수 오프셋)
    const color  = CLASS_COLORS[a.name] || "#888";

    segments += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${len.toFixed(1)} ${C.toFixed(1)}"
      stroke-dashoffset="${offset.toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;

    // 라벨 위치 계산
    const midAngle  = (cumLen + len/2) / C * 360; // 0~360, clockwise from top
    const rad       = midAngle * Math.PI / 180;
    const rLabel    = r + sw/2 + 12;
    const rEnd      = r + sw/2 + 28;
    const x1 = cx + rLabel * Math.sin(rad);
    const y1 = cy - rLabel * Math.cos(rad);
    const x2 = cx + rEnd   * Math.sin(rad);
    const y2 = cy - rEnd   * Math.cos(rad);

    const isRight = x2 >= cx;
    const hx      = isRight ? Math.min(x2 + 18, W - 5) : Math.max(x2 - 18, 5);
    const anchor  = isRight ? "start" : "end";
    const pct     = (a.weight * 100).toFixed(1);

    labels += `
      <line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="1.2"/>
      <line x1="${x2.toFixed(1)}" y1="${y2.toFixed(1)}" x2="${hx}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="1.2"/>
      <text x="${isRight ? hx+2 : hx-2}" y="${(y2-3).toFixed(1)}" font-size="9.5" fill="${color}" font-weight="700" text-anchor="${anchor}">${a.name}</text>
      <text x="${isRight ? hx+2 : hx-2}" y="${(y2+8).toFixed(1)}" font-size="9" fill="#888" text-anchor="${anchor}">${pct}%</text>`;

    cumLen += len;
  });

  el("donutWrap").innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:100%;">
      ${segments}
      ${labels}
      <text x="${cx}" y="${cy-7}" text-anchor="middle" font-size="10" fill="#888">총자산</text>
      <text x="${cx}" y="${cy+9}" text-anchor="middle" font-size="11" fill="#111" font-weight="800">${fmt(total)}원</text>
    </svg>`;
}

// FAB / 바텀시트
el("openSheet").addEventListener("click", () => {
  el("f_date").value = new Date().toISOString().slice(0,10);
  el("sheet").classList.add("open");
});
el("sheet").addEventListener("click", e => {
  if (e.target.id === "sheet") el("sheet").classList.remove("open");
});

el("submitBtn").addEventListener("click", async () => {
  const payload = {
    date: el("f_date").value, type: el("f_type").value,
    name: el("f_name").value, qty:  el("f_qty").value,
    price: el("f_price").value, rate: el("f_rate").value,
    months: el("f_months").value
  };
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    showToast("기록이 추가됐습니다");
    el("sheet").classList.remove("open");
    setTimeout(loadData, 800);
  } catch(err) {
    showToast("추가 실패");
  }
});

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
