<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DC 퇴직연금">
<title>DC 퇴직연금 관리</title>
<style>
  :root{
    --ivory:#faf6ee;
    --card:#ffffff;
    --line:#e8e0d0;
    --line-soft:#f2ede2;
    --bar-bg:#efe9db;
    --ink:#2b2620;
    --ink-soft:#6b6355;
    --coral:#ff6b5e;   /* 손실/예수금/FAB */
    --green:#22b573;   /* 이익/한국주식 */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--ivory);
    color:var(--ink);
    font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    padding-bottom:90px;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── 헤더 ── */
  header{
    position:sticky; top:0; z-index:10;
    background:var(--card);
    padding:22px 20px 16px;
    border-bottom:2px solid var(--line);
  }
  .hd-tag{
    font-size:10px; letter-spacing:.22em; font-weight:700;
    text-transform:uppercase; color:var(--coral); margin-bottom:11px;
  }
  .hd-label{ font-size:11px; color:var(--ink-soft); margin-bottom:3px; }
  .hd-total{ font-size:29px; font-weight:800; color:var(--ink); letter-spacing:-0.02em; }
  .hd-profit{ display:flex; align-items:baseline; gap:8px; margin-top:8px; }
  .hd-profit-amt{ font-size:15px; font-weight:700; }
  .hd-profit-pct{ font-size:12px; font-weight:700; padding:2px 9px; border-radius:99px; }
  .hd-profit-amt.pos, .hd-profit-pct.pos{ color:var(--green); }
  .hd-profit-pct.pos{ background:#e2f5ec; }
  .hd-profit-amt.neg, .hd-profit-pct.neg{ color:var(--coral); }
  .hd-profit-pct.neg{ background:#ffe9e7; }
  .hd-profit-base{ font-size:10px; color:var(--ink-soft); margin-top:4px; }
  .hd-breakdown{
    display:flex; gap:16px; flex-wrap:wrap;
    font-size:11px; color:var(--ink-soft);
    margin-top:13px; padding-top:11px;
    border-top:1px solid var(--line);
  }
  .hd-breakdown b{ font-weight:700; color:var(--ink); }

  /* ── 바디 ── */
  main{ padding:14px 14px 0; }
  .sec-title{
    font-size:11px; font-weight:700; color:var(--ink-soft);
    letter-spacing:.08em; text-transform:uppercase;
    margin:12px 0 8px;
    display:flex; align-items:center; gap:8px;
  }
  .sec-title::after{ content:""; flex:1; height:1px; background:var(--line); }

  .card{
    background:var(--card);
    border-radius:12px; overflow:hidden;
    border:1px solid var(--line);
    margin-bottom:12px;
  }

  /* ── 보유 행 ── */
  .row{ padding:11px 14px; border-bottom:1px solid var(--line-soft); }
  .row:last-child{ border-bottom:none; }
  .row-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .row-name{ font-size:13.5px; font-weight:700; }
  .row-val{ font-size:13.5px; font-weight:700; }
  .row-mid{ font-size:10px; color:var(--ink-soft); margin-top:2px; }
  .row-bot{ display:flex; align-items:center; gap:6px; margin-top:6px; }
  .pnl{ font-size:11px; font-weight:700; white-space:nowrap; }
  .pnl.pos{ color:var(--green); }
  .pnl.neg{ color:var(--coral); }
  .bar-wrap{ flex:1; height:5px; border-radius:99px; overflow:hidden; background:var(--bar-bg); }
  .bar-fill{ height:100%; border-radius:99px; }
  .wt{ font-size:10px; color:var(--ink-soft); white-space:nowrap; }

  /* ── 자산 비중: 도넛 + 범례 ── */
  .alloc-flex{
    display:flex; align-items:center; gap:4px;
    padding:14px 10px 8px;
  }
  .alloc-legend{ flex:1; min-width:0; }
  .lg-item{
    display:flex; align-items:center; gap:7px;
    padding:4px 0; font-size:11.5px;
  }
  .lg-dot{ width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .lg-name{ flex:1; color:var(--ink); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lg-pct{ font-weight:800; color:var(--ink); font-size:12px; }

  /* ── 자산군 바 ── */
  .brow{ padding:9px 14px; border-bottom:1px solid var(--line-soft); }
  .brow:last-child{ border-bottom:none; }
  .brow-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .brow-name{ font-size:12.5px; font-weight:700; }
  .brow-right{ display:flex; align-items:baseline; gap:8px; }
  .brow-pct{ font-size:13px; font-weight:800; }
  .brow-amt{ font-size:10px; color:var(--ink-soft); }
  .brow-track{ height:7px; border-radius:99px; overflow:hidden; background:var(--bar-bg); }
  .brow-fill{ height:100%; border-radius:99px; }

  /* ── FAB ── */
  .fab{
    position:fixed; bottom:22px; right:20px;
    width:56px; height:56px; border-radius:50%;
    background:var(--coral); color:#fff; font-size:26px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
    border:none;
    box-shadow:0 4px 14px rgba(255,107,94,.4);
  }

  /* ── 바텀시트 ── */
  .sheet{
    position:fixed; inset:0; background:rgba(43,38,32,.45);
    display:none; align-items:flex-end; z-index:20;
  }
  .sheet.open{ display:flex; }
  .sheet-inner{
    background:var(--ivory); width:100%; border-radius:20px 20px 0 0;
    padding:20px 18px 28px; max-height:82vh; overflow:auto;
    border-top:3px solid var(--coral);
  }
  .sheet-title{
    font-size:15px; font-weight:800; color:var(--ink);
    margin-bottom:14px;
  }
  .field{ margin-bottom:12px; }
  .field label{
    display:block; font-size:11px; font-weight:700;
    color:var(--ink-soft); margin-bottom:5px;
  }
  .field select, .field input{
    width:100%; padding:11px; border:1px solid var(--line);
    border-radius:8px; font-size:15px; font-family:inherit; color:var(--ink);
    background:var(--card);
  }
  .field select:focus, .field input:focus{ outline:none; border-color:var(--coral); }
  .submit{
    width:100%; padding:14px; border:none; border-radius:10px;
    background:var(--coral); color:#fff;
    font-size:15px; font-weight:800; letter-spacing:.02em;
  }
  .submit:active{ opacity:.85; }

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff;
    padding:9px 18px; border-radius:20px;
    font-size:12.5px; z-index:30; opacity:0; transition:opacity .3s;
  }
  .toast.show{ opacity:1; }
  .refresh{ font-size:10px; color:var(--ink-soft); text-align:center; margin-top:10px; }
</style>
</head>
<body>

<header>
  <div class="hd-tag">DC 퇴직연금 관리</div>
  <div class="hd-label">총자산</div>
  <div class="hd-total" id="totalValue">불러오는 중...</div>
  <div class="hd-profit" id="profitRow"></div>
  <div class="hd-profit-base" id="profitBase"></div>
  <div class="hd-breakdown" id="breakdown"></div>
</header>

<main>
  <div class="sec-title">보유 현황</div>
  <div class="card">
    <div id="holdingsList"></div>
  </div>

  <div class="sec-title">자산 비중</div>
  <div class="card">
    <div class="alloc-flex">
      <div id="donutWrap" style="flex-shrink:0;"></div>
      <div class="alloc-legend" id="allocLegend"></div>
    </div>
    <div id="allocList"></div>
  </div>

  <div class="refresh" id="refreshTime"></div>
</main>

<button class="fab" id="openSheet">+</button>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="sheet-title">거래 기록 추가</div>
    <div class="field">
      <label>날짜</label>
      <input type="date" id="f_date">
    </div>
    <div class="field">
      <label>구분</label>
      <select id="f_type">
        <option>매수</option><option>매도</option>
        <option>입금</option><option>출금</option>
        <option>가입</option><option>해지</option>
        <option>배당</option><option>수수료</option><option>조정</option>
      </select>
    </div>
    <div class="field">
      <label>종목/상품</label>
      <select id="f_name">
        <option>TIGER 200</option>
        <option>TIGER 미국S&P500</option>
        <option>KODEX TDF2050액티브적격</option>
        <option>TIGER 미국나스닥100</option>
        <option>TIGER 미국S&P500(H)</option>
        <option>TIGER 미국나스닥100채권혼합50</option>
        <option>KODEX AI반도체TOP2플러스</option>
        <option>SOL AI반도체TOP2플러스</option>
        <option>TIGER KRX금현물</option>
        <option>TIGER 일본니케이225</option>
        <option>현금</option>
        <option>다올저축은행 퇴직연금 정기예금</option>
      </select>
    </div>
    <div class="field">
      <label>수량 / 금액 (매도·출금·해지·수수료는 마이너스)</label>
      <input type="number" id="f_qty" placeholder="예: 10 또는 -10">
    </div>
    <div class="field">
      <label>단가 (ETF 매수·매도 시)</label>
      <input type="number" id="f_price" placeholder="예: 57000">
    </div>
    <div class="field">
      <label>금리 (연%, 예금 해지 시)</label>
      <input type="number" step="0.01" id="f_rate" placeholder="예: 3.5">
    </div>
    <div class="field">
      <label>개월 (예금 해지 시)</label>
      <input type="number" id="f_months" placeholder="예: 12">
    </div>
    <button class="submit" id="submitBtn">기록 추가</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ⚠️ Apps Script 배포 후 받은 웹 앱 URL
const API_URL = "https://script.google.com/macros/s/AKfycbxTNbFDX5G8IG_mFYZG9H9B0dZPD25eS5GNnapP4vifwhVaTGi7BgejH_LMGHkh4iM/exec";
const INITIAL_AMOUNT = 111043786;

const CLASS_COLORS = {
  "미국주식":   "#2f7de1",
  "한국주식":   "#22b573",
  "일본주식":   "#f4649b",
  "혼합":       "#f5a623",
  "대체자산":   "#e6b31e",
  "현금성자산": "#9b59d0",
  "예수금":     "#ff6b5e"
};

const el = id => document.getElementById(id);
function showToast(msg){
  const t = el("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
function fmt(n){ return Math.round(n).toLocaleString(); }

async function loadData(){
  try{
    const res  = await fetch(API_URL);
    const data = await res.json();
    render(data);
  }catch(err){
    el("totalValue").textContent = "불러오기 실패";
    showToast("연결 실패: API_URL 확인 필요");
  }
}

function render(data){
  el("totalValue").textContent = fmt(data.total) + "원";

  // 수익 금액 + %
  const up  = data.profit >= 0;
  const cls = up ? "pos" : "neg";
  const sign = up ? "+" : "";
  el("profitRow").innerHTML = `
    <span class="hd-profit-amt ${cls}">${sign}${fmt(data.profit)}원</span>
    <span class="hd-profit-pct ${cls}">${sign}${(data.profitPct*100).toFixed(2)}%</span>`;
  el("profitBase").textContent = `원금 ${fmt(INITIAL_AMOUNT)}원 기준`;

  let etf=0, cash=0, dep=0;
  data.holdings.forEach(h => {
    if (h.name === "현금") cash += h.value;
    else if (h.name.includes("예금") || h.name.includes("적금")) dep += h.value;
    else etf += h.value;
  });
  el("breakdown").innerHTML = `
    <span>ETF <b>${fmt(etf)}</b>원</span>
    <span>현금 <b>${fmt(cash)}</b>원</span>
    <span>예금 <b>${fmt(dep)}</b>원</span>`;

  // 보유 현황
  const isCash = n => n==="현금" || n.includes("예금") || n.includes("적금");
  el("holdingsList").innerHTML = data.holdings.map(h => {
    const unit   = isCash(h.name) ? "원" : "주";
    const avgStr = isCash(h.name) ? "" : ` · 평단가 ${fmt(h.avgPrice)}원`;
    const pnlHtml = isCash(h.name) ? "" :
      `<span class="pnl ${h.pnl>=0?"pos":"neg"}">${h.pnl>=0?"+":""}${fmt(h.pnl)}원 (${h.pnl>=0?"+":""}${(h.pnlPct*100).toFixed(2)}%)</span>`;
    const color = CLASS_COLORS[h.assetClass] || "#999";
    return `<div class="row">
      <div class="row-top">
        <span class="row-name">${h.name}</span>
        <span class="row-val">${fmt(h.value)}원</span>
      </div>
      <div class="row-mid">${fmt(h.qty)}${unit} · 현재가 ${fmt(h.price)}${avgStr}</div>
      <div class="row-bot">
        ${pnlHtml}
        <div class="bar-wrap"><div class="bar-fill" style="width:${(h.weight*100).toFixed(1)}%;background:${color};"></div></div>
        <span class="wt">${(h.weight*100).toFixed(1)}%</span>
      </div>
    </div>`;
  }).join("");

  // 도넛 + 범례
  renderDonut(data.allocation, data.total);
  el("allocLegend").innerHTML = data.allocation.map(a => {
    const color = CLASS_COLORS[a.name] || "#999";
    return `<div class="lg-item">
      <span class="lg-dot" style="background:${color};"></span>
      <span class="lg-name">${a.name}</span>
      <span class="lg-pct">${(a.weight*100).toFixed(1)}%</span>
    </div>`;
  }).join("");

  // 자산군 바
  el("allocList").innerHTML = data.allocation.map(a => {
    const color = CLASS_COLORS[a.name] || "#999";
    const pct   = (a.weight*100).toFixed(1);
    return `<div class="brow">
      <div class="brow-top">
        <span class="brow-name">${a.name}</span>
        <div class="brow-right">
          <span class="brow-pct" style="color:${color};">${pct}%</span>
          <span class="brow-amt">${fmt(a.value)}원</span>
        </div>
      </div>
      <div class="brow-track"><div class="brow-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>`;
  }).join("");

  el("refreshTime").textContent = "마지막 갱신 " + new Date().toLocaleTimeString("ko-KR");
}

function renderDonut(allocation, total){
  const size = 150, c = size/2, r = 52, sw = 26;
  const C = 2 * Math.PI * r;
  let segs = "", cumLen = 0;
  allocation.forEach(a => {
    const len   = a.weight * C;
    const color = CLASS_COLORS[a.name] || "#999";
    segs += `<circle cx="${c}" cy="${c}" r="${r}" fill="none"
      stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${len.toFixed(1)} ${C.toFixed(1)}"
      stroke-dashoffset="${(-cumLen).toFixed(1)}"
      transform="rotate(-90 ${c} ${c})"/>`;
    cumLen += len;
  });
  const totalShort = total >= 1e8 ? (total/1e8).toFixed(1) + "억" : fmt(total);
  el("donutWrap").innerHTML = `
    <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
      ${segs}
      <text x="${c}" y="${c-4}" text-anchor="middle" font-size="9" fill="#6b6355">총자산</text>
      <text x="${c}" y="${c+9}" text-anchor="middle" font-size="10" fill="#2b2620" font-weight="700">${totalShort}원</text>
    </svg>`;
}

el("openSheet").addEventListener("click", () => {
  el("f_date").value = new Date().toISOString().slice(0,10);
  el("sheet").classList.add("open");
});
el("sheet").addEventListener("click", e => {
  if (e.target.id === "sheet") el("sheet").classList.remove("open");
});
el("submitBtn").addEventListener("click", async () => {
  const payload = {
    date: el("f_date").value, type: el("f_type").value,
    name: el("f_name").value, qty: el("f_qty").value,
    price: el("f_price").value, rate: el("f_rate").value,
    months: el("f_months").value
  };
  try{
    await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    showToast("기록이 추가됐습니다");
    el("sheet").classList.remove("open");
    setTimeout(loadData, 800);
  }catch(err){
    showToast("추가 실패");
  }
});

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
